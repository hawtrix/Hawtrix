name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/hawtrix

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Write package.json and npmrc
        run: |
          cat > package.json << 'PKGJSON'
          {
            "name": "hawtrix",
            "version": "1.0.0",
            "private": true,
            "main": "expo-router/entry",
            "scripts": { "start": "expo start" },
            "dependencies": {
              "expo": "~54.0.27",
              "expo-router": "~6.0.17",
              "expo-blur": "~15.0.8",
              "expo-constants": "~18.0.11",
              "expo-font": "~14.0.10",
              "expo-haptics": "~15.0.8",
              "expo-image": "~3.0.11",
              "expo-image-picker": "~17.0.9",
              "expo-linear-gradient": "~15.0.8",
              "expo-linking": "~8.0.10",
              "expo-location": "~19.0.8",
              "expo-splash-screen": "~31.0.12",
              "expo-status-bar": "~3.0.9",
              "expo-system-ui": "~6.0.9",
              "expo-web-browser": "~15.0.10",
              "react": "19.1.0",
              "react-native": "0.81.5",
              "react-native-gesture-handler": "~2.28.0",
              "react-native-keyboard-controller": "1.18.5",
              "react-native-reanimated": "~4.1.1",
              "react-native-worklets": "~0.5.1",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0",
              "react-native-svg": "15.12.1",
              "@expo/vector-icons": "^15.0.3",
              "@expo-google-fonts/inter": "^0.4.0",
              "@react-native-async-storage/async-storage": "2.2.0",
              "@tanstack/react-query": "^5.90.21",
              "zod": "^3.25.76"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2",
              "@types/react": "~19.1.10",
              "typescript": "~5.9.2"
            }
          }
          PKGJSON
          echo "legacy-peer-deps=true" > .npmrc

      - name: Install dependencies
        run: npm install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Disable minification for release
        run: |
          sed -i 's/minifyEnabled enableProguardInReleaseBuilds/minifyEnabled false/' android/app/build.gradle || true
          grep -n "minifyEnabled" android/app/build.gradle || true

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-full.log
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Print failure summary (copy this if it fails)
        if: always()
        run: |
          echo "===== Metro/Node bundler output ====="
          grep -n -B2 -A80 "createBundleReleaseJsAndAssets" /tmp/gradle-full.log | head -n 200 || true
          echo
          echo "===== FAILURE / What went wrong ====="
          awk '/FAILURE: Build failed|What went wrong/{found=1} found' /tmp/gradle-full.log | head -n 100 || true

      - name: Find APK
        run: find android/app/build/outputs/apk -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hawtrix-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
