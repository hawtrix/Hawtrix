name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/hawtrix

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Write base package.json, npmrc and metro.config.js
        run: |
          cat > package.json << 'PKGJSON'
          {
            "name": "hawtrix",
            "version": "1.0.0",
            "private": true,
            "main": "expo-router/entry",
            "scripts": { "start": "expo start" },
            "dependencies": {
              "expo": "~54.0.27",
              "expo-router": "~6.0.17",
              "expo-constants": "~18.0.11",
              "expo-linking": "~8.0.10",
              "expo-splash-screen": "~31.0.12",
              "expo-status-bar": "~3.0.9",
              "expo-system-ui": "~6.0.9",
              "react": "19.1.0",
              "react-native": "0.81.5",
              "react-native-gesture-handler": "~2.28.0",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2",
              "@types/react": "~19.1.10",
              "typescript": "~5.9.2"
            }
          }
          PKGJSON
          echo "legacy-peer-deps=true" > .npmrc
          cat > metro.config.js << 'METROJS'
          const { getDefaultConfig } = require('expo/metro-config');
          const path = require('path');

          const projectRoot = __dirname;
          const config = getDefaultConfig(projectRoot);

          config.watchFolders = [projectRoot];
          config.resolver.nodeModulesPaths = [path.resolve(projectRoot, 'node_modules')];

          module.exports = config;
          METROJS

      - name: Install base dependencies
        run: npm install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Auto-detect and install every package used by the code
        run: |
          cat > detect-deps.mjs << 'DETECTJS'
          import { readFileSync, readdirSync, statSync } from "fs";
          import path from "path";

          const root = process.cwd();
          const skipDirs = new Set(["node_modules", "android", "ios", ".git", ".expo", ".expo-shared", "build", "dist"]);
          const exts = new Set([".ts", ".tsx", ".js", ".jsx"]);
          const builtins = new Set([
            "fs","path","os","crypto","http","https","stream","util","events","buffer",
            "child_process","url","querystring","zlib","assert","net","tls","dns","dgram",
            "cluster","readline","repl","vm","worker_threads","perf_hooks","string_decoder",
            "timers","tty","punycode","module","process"
          ]);
          const importRe = /(?:from|require\()\s*['"]([^'"]+)['"]/g;

          function walk(dir, files = []) {
            for (const entry of readdirSync(dir)) {
              if (skipDirs.has(entry)) continue;
              const full = path.join(dir, entry);
              const st = statSync(full);
              if (st.isDirectory()) walk(full, files);
              else if (exts.has(path.extname(entry))) files.push(full);
            }
            return files;
          }

          function toPackageName(spec) {
            if (spec.startsWith(".") || spec.startsWith("/") || spec.startsWith("@/")) return null;
            const parts = spec.split("/");
            if (spec.startsWith("@")) return parts.slice(0, 2).join("/");
            return parts[0];
          }

          const pkgJson = JSON.parse(readFileSync("package.json", "utf8"));
          const known = new Set([
            ...Object.keys(pkgJson.dependencies || {}),
            ...Object.keys(pkgJson.devDependencies || {}),
          ]);

          const found = new Set();
          for (const file of walk(root)) {
            const content = readFileSync(file, "utf8");
            let m;
            while ((m = importRe.exec(content))) {
              const pkg = toPackageName(m[1]);
              if (pkg && !builtins.has(pkg) && !known.has(pkg)) found.add(pkg);
            }
          }

          console.log([...found].join("\n"));
          DETECTJS

          MISSING=$(node detect-deps.mjs)
          if [ -n "$MISSING" ]; then
            echo "Packages détectés et manquants :"
            echo "$MISSING"
            npx expo install $MISSING --no-install-check || npx expo install $MISSING
          else
            echo "Aucune dépendance manquante détectée."
          fi
          npm install

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hawtrix-apk
          path: artifacts/hawtrix/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
