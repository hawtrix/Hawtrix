name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/hawtrix

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Write base package.json, npmrc and metro.config.js
        run: |
          cat > package.json << 'PKGJSON'
          {
            "name": "hawtrix",
            "version": "2.0.0",
            "private": true,
            "main": "expo-router/entry",
            "scripts": { "start": "expo start" },
            "dependencies": {
              "expo": "~54.0.27",
              "expo-router": "~6.0.17",
              "expo-constants": "~18.0.11",
              "expo-linking": "~8.0.10",
              "expo-splash-screen": "~31.0.12",
              "expo-status-bar": "~3.0.9",
              "expo-system-ui": "~6.0.9",
              "react": "19.1.0",
              "react-native": "0.81.5",
              "react-native-gesture-handler": "~2.28.0",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2",
              "@types/react": "~19.1.10",
              "typescript": "~5.9.2",
              "babel-plugin-module-resolver": "^5.0.2"
            }
          }
          PKGJSON
          echo "legacy-peer-deps=true" > .npmrc
          cat > metro.config.js << 'METROJS'
          const { getDefaultConfig } = require('expo/metro-config');
          const path = require('path');

          const projectRoot = __dirname;
          const config = getDefaultConfig(projectRoot);

          config.watchFolders = [projectRoot];
          config.resolver.nodeModulesPaths = [path.resolve(projectRoot, 'node_modules')];

          module.exports = config;
          METROJS

      - name: Install base dependencies
        run: npm install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Auto-detect and install every package used by the code
        run: |
          cat > detect-deps.mjs << 'DETECTJS'
          import { readFileSync, readdirSync, statSync, existsSync } from "fs";
          import path from "path";

          const root = process.cwd();
          const skipDirs = new Set(["node_modules", "android", "ios", ".git", ".expo", ".expo-shared", "build", "dist"]);
          const exts = new Set([".ts", ".tsx", ".js", ".jsx"]);
          const builtins = new Set([
            "fs","path","os","crypto","http","https","stream","util","events","buffer",
            "child_process","url","querystring","zlib","assert","net","tls","dns","dgram",
            "cluster","readline","repl","vm","worker_threads","perf_hooks","string_decoder",
            "timers","tty","punycode","module","process"
          ]);
          const importRe = /(?:from|require\()\s*['"]([^'"]+)['"]/g;
          const quotedStringRe = /['"]([^'"]+)['"]/g;

          function walk(dir, files = []) {
            for (const entry of readdirSync(dir)) {
              if (skipDirs.has(entry)) continue;
              const full = path.join(dir, entry);
              const st = statSync(full);
              if (st.isDirectory()) walk(full, files);
              else if (exts.has(path.extname(entry))) files.push(full);
            }
            return files;
          }

          function toPackageName(spec) {
            if (!spec || spec.startsWith(".") || spec.startsWith("/") || spec.startsWith("@/")) return null;
            const parts = spec.split("/");
            if (spec.startsWith("@")) return parts.slice(0, 2).join("/");
            return parts[0];
          }

          const pkgJson = JSON.parse(readFileSync("package.json", "utf8"));
          const known = new Set([
            ...Object.keys(pkgJson.dependencies || {}),
            ...Object.keys(pkgJson.devDependencies || {}),
          ]);

          const found = new Set();

          // 1. Scan source files for imports/requires
          for (const file of walk(root)) {
            const content = readFileSync(file, "utf8");
            let m;
            while ((m = importRe.exec(content))) {
              const pkg = toPackageName(m[1]);
              if (pkg && !builtins.has(pkg) && !known.has(pkg)) found.add(pkg);
            }
          }

          // 2. Scan app.json / app.config.js / app.config.ts for "plugins" entries
          function addPluginsFromArray(arr) {
            for (const entry of arr) {
              const name = Array.isArray(entry) ? entry[0] : entry;
              if (typeof name !== "string") continue;
              const pkg = toPackageName(name);
              if (pkg && !builtins.has(pkg) && !known.has(pkg)) found.add(pkg);
            }
          }

          if (existsSync("app.json")) {
            try {
              const appJson = JSON.parse(readFileSync("app.json", "utf8"));
              const plugins = appJson.expo?.plugins;
              if (Array.isArray(plugins)) addPluginsFromArray(plugins);
            } catch {}
          }

          for (const cfgFile of ["app.config.js", "app.config.ts"]) {
            if (existsSync(cfgFile)) {
              const content = readFileSync(cfgFile, "utf8");
              const pluginsBlockMatch = content.match(/plugins\s*:\s*\[([\s\S]*?)\]/);
              if (pluginsBlockMatch) {
                const names = [];
                let qm;
                while ((qm = quotedStringRe.exec(pluginsBlockMatch[1]))) {
                  names.push(qm[1]);
                }
                addPluginsFromArray(names);
              }
            }
          }

          // 3. Known implicit peer dependencies not directly imported in JS/config
          const implicitPeers = {
            "react-native-reanimated": ["react-native-worklets"],
          };
          for (const [trigger, peers] of Object.entries(implicitPeers)) {
            if (known.has(trigger) || found.has(trigger)) {
              for (const peer of peers) {
                if (!known.has(peer) && !found.has(peer)) found.add(peer);
              }
            }
          }

          console.log([...found].join("\n"));
          DETECTJS

          MISSING=$(node detect-deps.mjs)
          if [ -n "$MISSING" ]; then
            echo "Packages détectés et manquants :"
            echo "$MISSING"
            npx expo install $MISSING --npm
          else
            echo "Aucune dépendance manquante détectée."
          fi
          npm install

      - name: Write babel.config.js (module-resolver alias + reanimated/worklets support)
        run: |
          cat > detect-worklets.mjs << 'DETECTWORKLETS'
          import { readFileSync } from "fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const all = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
          console.log(all["react-native-worklets"] ? "true" : "false");
          DETECTWORKLETS
          HAS_WORKLETS=$(node detect-worklets.mjs)

          ALIAS_ROOT="."
          CANDIDATE=$(find . \( -path './node_modules' -o -path './android' -o -path './ios' -o -path './.git' \) -prune -o -type d -iname utils -print | while read -r d; do
            parent=$(dirname "$d")
            if [ -d "$parent/data" ] || [ -d "$parent/Data" ]; then echo "$parent"; fi
          done | head -1)
          if [ -z "$CANDIDATE" ]; then
            CANDIDATE=$(find . \( -path './node_modules' -o -path './android' -o -path './ios' -o -path './.git' \) -prune -o -type d -iname utils -print | head -1 | xargs -r dirname)
          fi
          if [ -n "$CANDIDATE" ]; then
            ALIAS_ROOT="$CANDIDATE"
          fi
          echo "Detected @ alias root: $ALIAS_ROOT"
          echo "ALIAS_ROOT=$ALIAS_ROOT" >> "$GITHUB_ENV"

          if [ "$HAS_WORKLETS" = "true" ]; then
            cat > babel.config.js << BABELJS
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [
                [
                  'module-resolver',
                  {
                    root: ['$ALIAS_ROOT'],
                    alias: { '@': '$ALIAS_ROOT' },
                  },
                ],
                'react-native-worklets/plugin',
              ],
            };
          };
          BABELJS
          else
            cat > babel.config.js << BABELJS
          module.exports = function (api) {
            api.cache(true);
            return {
              presets: ['babel-preset-expo'],
              plugins: [
                [
                  'module-resolver',
                  {
                    root: ['$ALIAS_ROOT'],
                    alias: { '@': '$ALIAS_ROOT' },
                  },
                ],
              ],
            };
          };
          BABELJS
          fi
          echo "--- babel.config.js ---"
          cat babel.config.js

      - name: Diagnose and fix case-sensitivity mismatches for @/ imports
        run: |
          echo "--- Directories that look like 'utils' or 'data' (any case) ---"
          find . \( -path './node_modules' -o -path './android' -o -path './ios' -o -path './.git' \) -prune -o -type d \( -iname 'utils' -o -iname 'data' \) -print

          cat > fix-case.mjs << 'FIXCASE'
          import { readFileSync, readdirSync, statSync, existsSync, symlinkSync, mkdirSync } from "fs";
          import path from "path";

          const aliasRoot = process.env.ALIAS_ROOT || ".";
          const root = process.cwd();
          const skipDirs = new Set(["node_modules", "android", "ios", ".git", ".expo", ".expo-shared", "build", "dist"]);
          const exts = new Set([".ts", ".tsx", ".js", ".jsx"]);
          const importRe = /from\s+['"]@\/([^'"]+)['"]/g;
          const candidateSuffixes = ["", ".ts", ".tsx", ".js", ".jsx", "/index.ts", "/index.tsx", "/index.js", "/index.jsx"];

          function walk(dir, files = []) {
            for (const entry of readdirSync(dir)) {
              if (skipDirs.has(entry)) continue;
              const full = path.join(dir, entry);
              const st = statSync(full);
              if (st.isDirectory()) walk(full, files);
              else if (exts.has(path.extname(entry))) files.push(full);
            }
            return files;
          }

          function findCaseInsensitive(base, segments) {
            let current = base;
            for (const seg of segments) {
              if (!existsSync(current) || !statSync(current).isDirectory()) return null;
              const entries = readdirSync(current);
              const match = entries.find((e) => e.toLowerCase() === seg.toLowerCase());
              if (!match) return null;
              current = path.join(current, match);
            }
            return current;
          }

          const specs = new Set();
          for (const file of walk(root)) {
            const content = readFileSync(file, "utf8");
            let m;
            while ((m = importRe.exec(content))) specs.add(m[1]);
          }

          const baseDir = path.join(root, aliasRoot);
          let fixed = 0;

          for (const spec of specs) {
            const exactExists = candidateSuffixes.some((suffix) => existsSync(path.join(baseDir, spec) + suffix));
            if (exactExists) continue;

            const segments = spec.split("/");
            let resolvedReal = null;

            for (const suffix of candidateSuffixes) {
              const lastWithSuffix = segments[segments.length - 1] + suffix;
              const segsToTry = suffix.startsWith("/")
                ? [...segments, ...suffix.slice(1).split("/")]
                : [...segments.slice(0, -1), lastWithSuffix];
              const real = findCaseInsensitive(baseDir, segsToTry);
              if (real && statSync(real).isFile()) {
                resolvedReal = real;
                break;
              }
            }

            if (!resolvedReal) {
              console.log(`No case-insensitive match found for @/${spec} — leaving as-is.`);
              continue;
            }

            const targetPath = path.join(baseDir, spec) + path.extname(resolvedReal);
            mkdirSync(path.dirname(targetPath), { recursive: true });
            if (!existsSync(targetPath)) {
              symlinkSync(path.relative(path.dirname(targetPath), resolvedReal), targetPath);
              console.log(`Fixed case mismatch: @/${spec} -> ${path.relative(root, resolvedReal)}`);
              fixed++;
            }
          }

          console.log(`Total case mismatches fixed: ${fixed}`);
          FIXCASE

          node fix-case.mjs

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hawtrix-apk
          path: artifacts/hawtrix/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
