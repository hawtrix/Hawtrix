kind = "web"
previewPath = "/site/"
title = "Hawtrix - Site Web"
version = "1.0.0"
id = "artifacts/hawtrix-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/site/" ]
localPort = 19804

[services.development]
run = "pnpm --filter @workspace/hawtrix-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hawtrix-web", "run", "build" ]
publicDir = "artifacts/hawtrix-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19804"
BASE_PATH = "/site/"
